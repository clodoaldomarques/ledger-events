apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-events-app
  labels:
    com.job.service: ledger-events-app
    tier: golang
spec:
  selector: 
    matchLabels:
      com.job.service: ledger-events-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels: 
        com.job.service: ledger-events-app
        tier: golang
    spec:
      serviceAccountName: default
      initContainers:
        - name: init-db
          image: mysql:8.0
          env:
            - name: MYSQL_HOST
              value: "mysql-service"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: "ledger"               # nome do banco de dados para este serviço
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials   # mesmo secret centralizado
                  key: admin_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: admin_password
            - name: AWS_ADDRESS
              value: "http://localstack-service:4566"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID 
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY 
            - name: AWS_REGION
              value: "us-east-1"              
            - name: EVENTS_SNS_TOPIC
              value: "arn:aws:sns:us-east-1:000000000000:events-sns-topic"
            - name: LEDGER_CONFIG_API_URL
              value: "http://ledger-config-app-service:5000"
          command:
            - /bin/bash
            - -c
            - |
              until mysql -h ${MYSQL_HOST} -P ${MYSQL_PORT} -u ${MYSQL_USER} -p${MYSQL_PASSWORD} -e "SELECT 1" >/dev/null 2>&1; do
                echo "Aguardando MySQL em ${MYSQL_HOST}:${MYSQL_PORT}..."
                sleep 2
              done
              echo "MySQL OK - Executando schema no banco ${MYSQL_DATABASE}..."
              mysql -h ${MYSQL_HOST} -P ${MYSQL_PORT} -u ${MYSQL_USER} -p${MYSQL_PASSWORD} ${MYSQL_DATABASE} < /scripts/schema.sql
              echo "Schema aplicado com sucesso."
          volumeMounts:
            - name: schema-volume
              mountPath: /scripts
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      containers:
        - name: ledger-events-app
          image: clodoaldomarques/ledger-events:latest
          imagePullPolicy: "Always"
          env:
            # Variáveis para o MySQL (se a aplicação precisar)
            - name: MYSQL_HOST
              value: "mysql-service"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: "ledger"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: admin_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: admin_password
            # Variáveis para LocalStack (AWS)
            - name: AWS_ADDRESS
              value: "http://localstack-service:4566"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID 
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY 
            - name: AWS_REGION
              value: "us-east-1"                   
          ports:
            - name: events-app
              containerPort: 5001
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: schema-volume
          configMap:
            name: ledger-schema