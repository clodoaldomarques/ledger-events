apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounting-events-app
  labels:
    com.job.service: accounting-events-app
    tier: golang
spec:
  selector: 
    matchLabels:
      com.job.service: accounting-events-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels: 
        com.job.service: accounting-events-app
        tier: golang
    spec:
      serviceAccountName: default
      containers:
        - name: accounting-events-app
          image: clodoaldomarques/accounting-events-api:latest
          imagePullPolicy: "Always"
          env:          
            - name: AWS_ADDRESS
              value: "http://localstack-service:4566"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                 secretKeyRef:
                   name: aws-secrets
                   key: AWS_ACCESS_KEY_ID 
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                 secretKeyRef:
                   name: aws-secrets
                   key: AWS_SECRET_ACCESS_KEY 
            - name: AWS_REGION
              value: "us-east-1"                   
          ports:
            - name: events-app
              containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: accounting-events-app-service
  labels:
    com.job.service: accounting-events-app-service
spec:
  type: LoadBalancer
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 31001
  selector:
    com.job.service: accounting-events-app
    tier: golang